	<html>
	    <head>
	        <title>Pizza Nossa!</title>
			<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
			<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
			<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	    </head>
	    <body>

<div class="max-lg:collapse bg-base-200 lg:mb-48 shadow-sm w-full rounded-md">
    <input id="navbar-1-toggle" class="peer hidden" type="checkbox" />
    <label for="navbar-1-toggle" class="fixed inset-0 hidden max-lg:peer-checked:block"></label>

    <div class="collapse-title navbar">
        <div class="navbar-start">
            <label for="navbar-1-toggle" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                </svg>
            </label>

            <a href="{{ url_for('inicial') }}" class="btn btn-ghost text-xl text-red-800">
                🍕 Pizza Nossa!
            </a>
        </div>

        <!-- Menu Desktop -->
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li>
                    <a href="{{ url_for('inicial') }}">
                        Página Inicial
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('cardapio') }}">
                        Cardápio
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('avaliacoes') }}">
                        Avaliações
                    </a>
                </li>

                <li>
                    <details>
                        <summary>Fale Conosco</summary>
                        <ul class="p-2 bg-base-100 w-48 z-10">
                            <li>
                                <a href="{{ url_for('fale') }}">
                                    Contato
                                </a>
                            </li>
                            <li>
                                <a href="https://wa.me/seu_numero" target="_blank">
                                    WhatsApp
                                </a>
                            </li>
                        </ul>
                    </details>
                </li>

                <li>
                    <a href="{{ url_for('login') }}">
                        Login
                    </a>
                </li>
            </ul>
        </div>

        <div class="navbar-end">
            <input type="text"
                placeholder="Pesquisar"
                class="input input-bordered w-64 lg:w-auto" />
        </div>
    </div>

    <!-- Menu Mobile -->
    <div class="collapse-content lg:hidden z-10">
        <ul class="menu">
            <li>
                <a href="{{ url_for('inicial') }}">
                    Página Inicial
                </a>
            </li>

            <li>
                <a href="{{ url_for('cardapio') }}">
                    Cardápio
                </a>
            </li>

            <li>
                <a href="{{ url_for('avaliacoes') }}">
                    Avaliações
                </a>
            </li>

            <li>
                <a href="{{ url_for('fale') }}">
                    Fale Conosco
                </a>
            </li>

            <li>
                <a href="{{ url_for('login') }}">
                    Login
                </a>
            </li>
        </ul>
    </div>
</div>
	        <main>
	        {% block conteudo %}
			{% endblock %}
	        </main>
	    </body>
	</html>
